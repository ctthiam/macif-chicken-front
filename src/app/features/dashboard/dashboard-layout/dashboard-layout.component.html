<!-- src/app/features/dashboard/dashboard-layout/dashboard-layout.component.html -->
<div class="flex h-screen bg-neutral-100 overflow-hidden">

  <!-- ── Overlay mobile ────────────────────────────────── -->
  @if (isMobile() && mobileOpen()) {
    <div
      class="fixed inset-0 bg-black/50 z-30 md:hidden"
      (click)="closeMobile()"
    ></div>
  }

  <!-- ── Sidebar ────────────────────────────────────────── -->
  <!-- Desktop : toujours visible, collapse en icônes -->
  <div
    class="hidden md:flex flex-col shrink-0 h-full shadow-sidebar transition-all duration-300"
    [class]="sidebarCollapsed() ? 'w-16' : 'w-60'"
  >
    <app-sidebar
      [collapsed]="sidebarCollapsed()"
      (collapsedChange)="sidebarCollapsed.set($event)"
    />
  </div>

  <!-- Mobile : drawer latéral (fixed) -->
  @if (isMobile()) {
    <div
      class="fixed left-0 top-0 h-full z-40 md:hidden transition-transform duration-300 flex flex-col"
      [class]="mobileOpen() ? 'translate-x-0' : '-translate-x-full'"
      style="width: 240px;"
    >
      <app-sidebar [collapsed]="false" />
    </div>
  }

  <!-- ── Contenu principal ─────────────────────────────── -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

    <!-- Topbar -->
    <app-topbar
      [sidebarCollapsed]="sidebarCollapsed()"
      (toggleSidebar)="toggleSidebar()"
    />

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto">
      <div class="p-4 sm:p-6 animate-fade-in">
        <router-outlet />
      </div>
    </main>
  </div>
</div>
